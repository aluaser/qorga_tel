services:
  - type: web
    name: qorga-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ACCESS_TTL
        value: 15m
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: SMTP_SERVICE
        value: gmail
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: DEFAULT_PSYCHOLOGIST_EMAIL
        sync: false
      - key: DEFAULT_PSYCHOLOGIST_GREETING
        sync: false
